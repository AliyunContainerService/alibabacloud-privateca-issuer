# This rule is not used by the project alibabacloud-privateca-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to alibabacloud.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: alibabacloud-privateca-issuer
    app.kubernetes.io/managed-by: kustomize
  name: pcaclusterissuer-viewer-role
rules:
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers/status
  verbs:
  - get
