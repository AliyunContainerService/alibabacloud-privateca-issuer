# This rule is not used by the project alibabacloud-privateca-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over alibabacloud.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: alibabacloud-privateca-issuer
    app.kubernetes.io/managed-by: kustomize
  name: pcaclusterissuer-admin-role
rules:
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers
  verbs:
  - '*'
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers/status
  verbs:
  - get
