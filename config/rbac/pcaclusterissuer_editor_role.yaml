# This rule is not used by the project alibabacloud-privateca-issuer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the alibabacloud.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: alibabacloud-privateca-issuer
    app.kubernetes.io/managed-by: kustomize
  name: pcaclusterissuer-editor-role
rules:
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - alibabacloud.com
  resources:
  - pcaclusterissuers/status
  verbs:
  - get
